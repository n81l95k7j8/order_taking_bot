name = "ai-order-bot"
main = "src/index.ts"
compatibility_date = "2026-06-29"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

# Set secrets with `wrangler secret put`
# or locally with .dev.vars

[[durable_objects.bindings]]
name = "BOT_STATE"
class_name = "BotStateDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["BotStateDurableObject"]

[observability]

[observability.logs]
enabled = true
invocation_logs = true
